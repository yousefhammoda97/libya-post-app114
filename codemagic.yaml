workflows:
  android-release:
    name: Libya Post - Android Release
    max_build_duration: 60
    environment:
      flutter: stable

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Get packages
        script: flutter pub get

      - name: Build APK (debug - no keystore needed)
        script: |
          flutter build apk --debug \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER

    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk

    publishing:
      email:
        recipients:
          - your@email.com
        notify:
          success: true
          failure: true
